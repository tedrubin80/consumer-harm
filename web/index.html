<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Consumer Harm — Evolution or the Void?</title>
    <meta
      name="description"
      content="CFPB credit card complaints: relief, the void, and fixed study windows."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --fg: #f8fafc;
        --accent: #dc2626;
        --muted: #94a3b8;
      }
      body {
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--fg);
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main {
        max-width: 40rem;
      }
      h1 {
        font-size: 1.75rem;
        margin-bottom: 0.5rem;
      }
      p {
        line-height: 1.6;
        color: var(--muted);
      }
      a.btn {
        display: inline-block;
        margin-top: 1.25rem;
        margin-right: 0.75rem;
        padding: 0.75rem 1.25rem;
        background: var(--accent);
        color: white;
        text-decoration: none;
        border-radius: 0.5rem;
        font-weight: 600;
      }
      a.link {
        color: #38bdf8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Consumer Harm</h1>
      <p>
        Story dashboard over the CFPB complaint database — credit cards, fixed study
        periods (2011–2024), and whether outcomes evolve or disappear into the void.
      </p>
      <p>
        The interactive app runs on
        <strong>Railway</strong> (Streamlit). This Vercel site is the landing page.
      </p>
      <a class="btn" href="https://consumer-harm-production.up.railway.app/">Open dashboard</a>
      <a class="link" href="https://github.com/tedrubin80/consumer-harm">GitHub</a>
    </main>
  </body>
</html>
